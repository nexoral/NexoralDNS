name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.changes.outputs.skip }}
      skip_release: ${{ steps.changes.outputs.skip_release }}
      run_tests: ${{ steps.changes.outputs.run_tests }}
      test_all: ${{ steps.changes.outputs.test_all }}
      test_web: ${{ steps.changes.outputs.test_web }}
      test_server: ${{ steps.changes.outputs.test_server }}
      test_tools: ${{ steps.changes.outputs.test_tools }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # full history needed to diff against the previous commit

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          skip_docker="false"
          skip_release="false"

          # Manual runs are an explicit request to build — never skip those.
          # A manual dispatch can't be diffed against a specific push, so run the
          # full test suite (test_all) to be safe.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manually triggered — building and releasing regardless of changed paths."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "skip_release=false" >> "$GITHUB_OUTPUT"
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "test_all=true" >> "$GITHUB_OUTPUT"
            echo "test_web=true" >> "$GITHUB_OUTPUT"
            echo "test_server=true" >> "$GITHUB_OUTPUT"
            echo "test_tools=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "No previous commit to diff against (new branch/first push) — building and releasing."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "skip_release=false" >> "$GITHUB_OUTPUT"
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "test_all=true" >> "$GITHUB_OUTPUT"
            echo "test_web=true" >> "$GITHUB_OUTPUT"
            echo "test_server=true" >> "$GITHUB_OUTPUT"
            echo "test_tools=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$BEFORE_SHA" "${{ github.sha }}")
          echo "Changed files in this push:"
          echo "$CHANGED_FILES"

          if [ -z "$CHANGED_FILES" ]; then
            echo "::notice title=Docker build skipped::No changed files detected."
            echo "::notice title=Release build skipped::No changed files detected."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "test_all=false" >> "$GITHUB_OUTPUT"
            echo "test_web=false" >> "$GITHUB_OUTPUT"
            echo "test_server=false" >> "$GITHUB_OUTPUT"
            echo "test_tools=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── Test-suite selection ──────────────────────────────────────────
          # Decide which Test/ suite(s) to run based on which module folders were
          # touched:
          #   - Web/ only      -> npm run test:web
          #   - server/ only   -> npm run test:server   (suite is a future stub)
          #   - tools/ only    -> npm run test:tools    (suite is a future stub)
          #   - any 2 of them  -> run each changed module's suite
          #   - all 3 modules, OR anything under Test/ -> npm run test (full)
          web_changed=false
          server_changed=false
          tools_changed=false
          test_changed=false
          if echo "$CHANGED_FILES" | grep -qE '^Web/';    then web_changed=true;    fi
          if echo "$CHANGED_FILES" | grep -qE '^server/'; then server_changed=true; fi
          if echo "$CHANGED_FILES" | grep -qE '^tools/';  then tools_changed=true;  fi
          if echo "$CHANGED_FILES" | grep -qE '^Test/';   then test_changed=true;   fi

          run_tests=false
          test_all=false
          if [ "$test_changed" = "true" ] || { [ "$web_changed" = "true" ] && [ "$server_changed" = "true" ] && [ "$tools_changed" = "true" ]; }; then
            # Test harness itself changed, or all three modules changed at once.
            run_tests=true
            test_all=true
            echo "::notice title=Tests::Running the full suite (npm run test)."
          elif [ "$web_changed" = "true" ] || [ "$server_changed" = "true" ] || [ "$tools_changed" = "true" ]; then
            run_tests=true
            echo "::notice title=Tests::Running per-module suites (web=$web_changed server=$server_changed tools=$tools_changed)."
          else
            echo "::notice title=Tests skipped::No changes under Web/, server/, tools/, or Test/."
          fi

          echo "run_tests=$run_tests"     >> "$GITHUB_OUTPUT"
          echo "test_all=$test_all"       >> "$GITHUB_OUTPUT"
          echo "test_web=$web_changed"    >> "$GITHUB_OUTPUT"
          echo "test_server=$server_changed" >> "$GITHUB_OUTPUT"
          echo "test_tools=$tools_changed"   >> "$GITHUB_OUTPUT"

          # Scripts/install.sh, Scripts/versionControl.sh, and Scripts/cli/* are host-side installer
          # scripts never executed inside the container (only Scripts/docker-entrypoint.sh is), so
          # they're excluded here.
          NON_DOCS_CHANGES=$(echo "$CHANGED_FILES" | grep -vE '^(Docs/|\.github/|\.claude/|Scripts/install\.sh$|Scripts/versionControl\.sh$|Scripts/cli/|.*\.md$)' || true)
          if [ -z "$NON_DOCS_CHANGES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            skip_docker="true"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

          version_changed=false
          scripts_changed=false
          if echo "$CHANGED_FILES" | grep -q "^VERSION$"; then
            version_changed=true
          fi
          if echo "$CHANGED_FILES" | grep -q "^Scripts/"; then
            scripts_changed=true
          fi

          if [ "$version_changed" = "true" ] && [ "$scripts_changed" = "true" ]; then
            echo "skip_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
            skip_release="true"
            
            if [ "$scripts_changed" = "true" ] && [ "$version_changed" = "false" ]; then
              echo "::notice title=Release build skipped::Files under Scripts/ changed, but VERSION was not updated."
            elif [ "$scripts_changed" = "false" ] && [ "$version_changed" = "true" ]; then
              echo "::notice title=Release build skipped::VERSION changed, but no files under Scripts/ changed."
            else
              echo "::notice title=Release build skipped::Neither VERSION nor Scripts/ files changed."
            fi
          fi

      - name: Annotate skipped build
        if: steps.changes.outputs.skip == 'true'
        shell: bash
        run: |
          {
            echo "### ⏭️ Docker build skipped"
            echo ""
            echo "Only Docs/, .github/, .claude/, Scripts/install.sh, Scripts/versionControl.sh and/or Markdown files changed in this push — none of these affect the running Docker image, so the build/push was skipped."
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Checked at | $(date -u +"%Y-%m-%dT%H:%M:%SZ") |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Annotate skipped release
        if: steps.changes.outputs.skip_release == 'true'
        shell: bash
        run: |
          {
            echo "### ⏭️ Package release build skipped"
            echo ""
            echo "Release packaging was skipped because either the \`Scripts/\` files or the \`VERSION\` file was not updated in this push. Both must change to trigger an automated release."
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Checked at | $(date -u +"%Y-%m-%dT%H:%M:%SZ") |"
          } >> "$GITHUB_STEP_SUMMARY"

  test-environment:
    needs: detect-changes
    if: needs.detect-changes.outputs.run_tests == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Test/package-lock.json

      # The Test/ suite is fully self-contained: every external service
      # (MongoDB, Redis, RabbitMQ, pino, etc.) is mocked, so no real
      # infrastructure is required and only Test/'s own deps need installing.
      - name: Install test dependencies
        working-directory: Test
        run: npm ci

      # `coverage:*` commands run the same tests as `test:*` AND emit a coverage
      # report, so they are used in place of the plain test runs (running both
      # would execute each suite twice). A coverage run still fails the job if any
      # test fails. Server has no coverage suite yet, so it keeps `test:server`.
      - name: Run full test suite with coverage (all modules)
        if: needs.detect-changes.outputs.test_all == 'true'
        working-directory: Test
        run: npm run coverage

      - name: Run Web test suite with coverage
        if: needs.detect-changes.outputs.test_all != 'true' && needs.detect-changes.outputs.test_web == 'true'
        working-directory: Test
        run: npm run coverage:web

      - name: Run server test suite
        if: needs.detect-changes.outputs.test_all != 'true' && needs.detect-changes.outputs.test_server == 'true'
        working-directory: Test
        run: npm run test:server

      - name: Run tools test suite with coverage
        if: needs.detect-changes.outputs.test_all != 'true' && needs.detect-changes.outputs.test_tools == 'true'
        working-directory: Test
        run: npm run coverage:tools

  build-and-push:
    # Gated on the test suite: the image is only built/pushed once tests pass.
    # test-environment is skipped when no testable folder changed (e.g. a
    # Dockerfile-only change), so we allow success OR skipped but block failure.
    needs: [detect-changes, test-environment]
    if: >-
      !cancelled() &&
      needs.detect-changes.result == 'success' &&
      needs.detect-changes.outputs.skip != 'true' &&
      (needs.test-environment.result == 'success' || needs.test-environment.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nexoraldns:latest
          file: ./Dockerfile
          build-args: |
            NODE_ENV=production

      - name: Annotate image size and details
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="ghcr.io/${{ github.repository_owner }}/nexoraldns:latest"
          docker pull "$IMAGE"

          SIZE_BYTES=$(docker image inspect "$IMAGE" --format='{{.Size}}')
          SIZE_MB=$(awk "BEGIN {printf \"%.2f\", $SIZE_BYTES/1024/1024}")
          LAYERS=$(docker image inspect "$IMAGE" --format='{{len .RootFS.Layers}}')
          DIGEST="${{ steps.build.outputs.digest }}"
          PUSHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "::notice title=Docker image pushed::${IMAGE} — ${SIZE_MB} MB, ${LAYERS} layers, digest ${DIGEST}"

          {
            echo "### 🐳 Docker image published"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Image | \`${IMAGE}\` |"
            echo "| Digest | \`${DIGEST}\` |"
            echo "| Size | ${SIZE_MB} MB |"
            echo "| Layers | ${LAYERS} |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Pushed at | ${PUSHED_AT} |"
          } >> "$GITHUB_STEP_SUMMARY"

  release-packages:
    needs: detect-changes
    if: needs.detect-changes.outputs.skip_release != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Debian packages and tarballs
        run: |
          set -euo pipefail
          VERSION=$(cat VERSION)
          echo "Building packages for version: $VERSION"

          ARCHS=("amd64" "arm64" "i386")

          for ARCH in "${ARCHS[@]}"; do
            PKG_DIR="nexoraldns_${VERSION}_${ARCH}"
            mkdir -p "$PKG_DIR/DEBIAN"
            mkdir -p "$PKG_DIR/usr/bin"
            mkdir -p "$PKG_DIR/usr/share/nexoraldns/cli"
            mkdir -p "$PKG_DIR/etc/bash_completion.d"

            cp Scripts/install.sh "$PKG_DIR/usr/bin/nexoraldns"
            chmod +x "$PKG_DIR/usr/bin/nexoraldns"

            cp Scripts/cli/*.sh "$PKG_DIR/usr/share/nexoraldns/cli/"
            chmod 0644 "$PKG_DIR/usr/share/nexoraldns/cli"/*.sh

            {
              echo "# Bash completion for the nexoraldns CLI"
              echo "_nexoraldns_completions() {"
              echo "  local cur opts"
              echo "  cur=\"\${COMP_WORDS[COMP_CWORD]}\""
              echo "  opts=\"pack remove stop start update\""
              echo "  COMPREPLY=(\$(compgen -W \"\${opts}\" -- \"\${cur}\"))"
              echo "}"
              echo "complete -F _nexoraldns_completions nexoraldns"
            } > "$PKG_DIR/etc/bash_completion.d/nexoraldns"

            {
              echo "Package: nexoraldns"
              echo "Version: ${VERSION}"
              echo "Section: utils"
              echo "Priority: optional"
              echo "Architecture: ${ARCH}"
              echo "Depends: curl, iproute2, bash-completion"
              echo "Maintainer: Nexoral Team <support@nexoral.in>"
              echo "Description: Advanced DNS Management & Surveillance System CLI wrapper."
            } > "$PKG_DIR/DEBIAN/control"

            dpkg-deb --build "$PKG_DIR"
            tar -czf "nexoraldns_${VERSION}_${ARCH}.tar.gz" -C "$PKG_DIR/usr" bin/nexoraldns share/nexoraldns/cli
            rm -rf "$PKG_DIR"
          done

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat VERSION)

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists. Uploading/updating assets..."
            gh release upload "$VERSION" nexoraldns_*.deb nexoraldns_*.tar.gz --clobber
          else
            echo "Creating release $VERSION..."
            gh release create "$VERSION" nexoraldns_*.deb nexoraldns_*.tar.gz \
              --title "Release $VERSION" \
              --notes "Automated release of NexoralDNS CLI packages and Docker image for version $VERSION."
          fi

          echo "Fetching all releases..."
          ALL_RELEASES=$(gh release list --limit 100 --json tagName --jq '.[].tagName' 2>/dev/null || echo "")

          if [ -n "$ALL_RELEASES" ]; then
            readarray -t TAGS <<< "$ALL_RELEASES"

            # gh release list returns newest-first, so index 0/1 are the 2 releases to keep
            if [ ${#TAGS[@]} -gt 2 ]; then
              echo "Found ${#TAGS[@]} releases. Keeping the 2 latest. Deleting older ones..."
              for ((i=2; i<${#TAGS[@]}; i++)); do
                TAG="${TAGS[$i]}"
                if [ -n "$TAG" ]; then
                  echo "Deleting old release: $TAG"
                  gh release delete "$TAG" --yes --cleanup-tag || gh release delete "$TAG" --yes || true
                fi
              done
            else
              echo "Only ${#TAGS[@]} releases found. No cleanup needed."
            fi
          fi

