name: Build and Push Docker Image

on:
  push:
    branches:
      - main   # Trigger on push to main branch
  workflow_dispatch:  # Allow manual trigger

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.changes.outputs.skip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # full history needed to diff against the previous commit

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          # Manual runs are an explicit request to build — never skip those.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manually triggered — building regardless of changed paths."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "No previous commit to diff against (new branch/first push) — building."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$BEFORE_SHA" "${{ github.sha }}")
          echo "Changed files in this push:"
          echo "$CHANGED_FILES"

          if [ -z "$CHANGED_FILES" ]; then
            echo "::notice title=Docker build skipped::No changed files detected between ${BEFORE_SHA} and ${{ github.sha }}."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Anything NOT under Docs/, .github/, .claude/, and NOT a *.md file anywhere
          # in the repo counts as a real change — none of these paths are part of the
          # Docker image (server/Web/client/DHCP, per the Dockerfile), so a push
          # confined to them has nothing to rebuild.
          NON_DOCS_CHANGES=$(echo "$CHANGED_FILES" | grep -vE '^(Docs/|\.github/|\.claude/|.*\.md$)' || true)

          if [ -z "$NON_DOCS_CHANGES" ]; then
            echo "::notice title=Docker build skipped::Only Docs/, .github/, .claude/ and/or Markdown files changed in this push — none of these are part of the Docker image, skipping build/push."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Non-excluded changes detected — proceeding with build."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Annotate skipped build
        if: steps.changes.outputs.skip == 'true'
        shell: bash
        run: |
          {
            echo "### ⏭️ Docker build skipped"
            echo ""
            echo "Only \`Docs/\`, \`.github/\`, \`.claude/\` and/or Markdown files changed in this push — none of these are part of the Docker image, so the build/push was skipped."
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Checked at | $(date -u +"%Y-%m-%dT%H:%M:%SZ") |"
          } >> "$GITHUB_STEP_SUMMARY"

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nexoraldns:latest
          file: ./Dockerfile
          build-args: |
            NODE_ENV=production

      - name: Annotate image size and details
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="ghcr.io/${{ github.repository_owner }}/nexoraldns:latest"
          docker pull "$IMAGE"

          SIZE_BYTES=$(docker image inspect "$IMAGE" --format='{{.Size}}')
          SIZE_MB=$(awk "BEGIN {printf \"%.2f\", $SIZE_BYTES/1024/1024}")
          LAYERS=$(docker image inspect "$IMAGE" --format='{{len .RootFS.Layers}}')
          DIGEST="${{ steps.build.outputs.digest }}"
          PUSHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "::notice title=Docker image pushed::${IMAGE} — ${SIZE_MB} MB, ${LAYERS} layers, digest ${DIGEST}"

          {
            echo "### 🐳 Docker image published"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Image | \`${IMAGE}\` |"
            echo "| Digest | \`${DIGEST}\` |"
            echo "| Size | ${SIZE_MB} MB |"
            echo "| Layers | ${LAYERS} |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Pushed at | ${PUSHED_AT} |"
          } >> "$GITHUB_STEP_SUMMARY"

  release-packages:
    needs: detect-changes
    if: needs.detect-changes.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Debian packages and tarballs
        run: |
          set -euo pipefail
          VERSION=$(cat VERSION)
          echo "Building packages for version: $VERSION"

          # Define architectures
          ARCHS=("amd64" "arm64" "i386")

          for ARCH in "${ARCHS[@]}"; do
            # 1. Create packaging directory
            PKG_DIR="nexoraldns_${VERSION}_${ARCH}"
            mkdir -p "$PKG_DIR/DEBIAN"
            mkdir -p "$PKG_DIR/usr/bin"

            # 2. Copy install.sh as nexoraldns CLI wrapper
            cp Scripts/install.sh "$PKG_DIR/usr/bin/nexoraldns"
            chmod +x "$PKG_DIR/usr/bin/nexoraldns"

            # 3. Create control file
            {
              echo "Package: nexoraldns"
              echo "Version: ${VERSION}"
              echo "Section: utils"
              echo "Priority: optional"
              echo "Architecture: ${ARCH}"
              echo "Depends: curl, iproute2"
              echo "Maintainer: Nexoral Team <support@nexoral.in>"
              echo "Description: Advanced DNS Management & Surveillance System CLI wrapper."
            } > "$PKG_DIR/DEBIAN/control"


            # 4. Build .deb package
            dpkg-deb --build "$PKG_DIR"

            # 5. Create .tar.gz package containing the binary script
            tar -czf "nexoraldns_${VERSION}_${ARCH}.tar.gz" -C "$PKG_DIR/usr/bin" nexoraldns

            # Cleanup build folder
            rm -rf "$PKG_DIR"
          done

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat VERSION)
          
          # Check if the release already exists, if not create it
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists. Uploading/updating assets..."
            gh release upload "$VERSION" nexoraldns_*.deb nexoraldns_*.tar.gz --clobber
          else
            echo "Creating release $VERSION..."
            gh release create "$VERSION" nexoraldns_*.deb nexoraldns_*.tar.gz \
              --title "Release $VERSION" \
              --notes "Automated release of NexoralDNS CLI packages and Docker image for version $VERSION."
          fi

          # Keep only the last 2 releases and delete older ones
          echo "Fetching all releases..."
          ALL_RELEASES=$(gh release list --limit 100 --json tagName --jq '.[].tagName' 2>/dev/null || echo "")
          
          if [ -n "$ALL_RELEASES" ]; then
            # Convert to array
            readarray -t TAGS <<< "$ALL_RELEASES"
            
            # If there are more than 2 releases, keep the first 2 (index 0 and 1) and delete the rest
            if [ ${#TAGS[@]} -gt 2 ]; then
              echo "Found ${#TAGS[@]} releases. Keeping the 2 latest. Deleting older ones..."
              for ((i=2; i<${#TAGS[@]}; i++)); do
                TAG="${TAGS[$i]}"
                if [ -n "$TAG" ]; then
                  echo "Deleting old release: $TAG"
                  gh release delete "$TAG" --yes --cleanup-tag || gh release delete "$TAG" --yes || true
                fi
              done
            else
              echo "Only ${#TAGS[@]} releases found. No cleanup needed."
            fi
          fi

